name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # Same ruff version as uv.lock so local and CI results agree.
      - name: Ruff lint
        run: uvx ruff@0.15.20 check . --output-format=github

  types:
    name: Types (pyright ratchet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # All extras so optional imports (pyspark, msal, hvac, delta,
      # databricks, msgraph-sdk, ...) resolve; otherwise pyright reports them
      # as missing and the counts drift from a local run. [tool.pyright]
      # points pyright at this .venv.
      - name: Install dependencies
        run: >
          uv sync --locked
          --extra dev --extra spark --extra anthropic --extra openai
          --extra vault --extra azure --extra databricks --extra sharepoint

      # Pinned like ruff so local and CI agree on the exact diagnostics.
      - name: Pyright
        run: uvx pyright@1.1.406 --outputjson > pyright.json

      # Gate: fail only when a file already in the baseline gains errors. New
      # modules and tests/ are not gated (see scripts/pyright_ratchet.py).
      - name: Ratchet against baseline
        run: uv run python scripts/pyright_ratchet.py --input pyright.json

      # Advisory: surface tests/ type errors without blocking (tests are
      # excluded from [tool.pyright].include, so point pyright at them here).
      - name: Type-check tests (advisory)
        if: always()
        continue-on-error: true
        run: uvx pyright@1.1.406 tests

  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PySpark needs a JVM; the runner's default Java can drift, so pin it.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # Python version comes from .python-version; --locked fails the build
      # if uv.lock is out of sync with pyproject.toml instead of re-resolving.
      # pyspark is an extra (in-memory mode is Spark-free); CI installs it so
      # the Spark-backed tests (Delta contract, tracking) keep running here.
      - name: Install dependencies
        run: uv sync --locked --extra dev --extra spark

      # Slow end-to-end tests skip themselves automatically: they need the
      # user-provided reference_docs/ PDFs, which are gitignored and absent here.
      - name: Run tests
        run: >
          uv run pytest -v
          --junitxml=junit.xml
          --cov --cov-report=xml --cov-report=term-missing:skip-covered

      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            junit.xml
            coverage.xml
          if-no-files-found: error
