name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # Same ruff version as uv.lock so local and CI results agree.
      - name: Ruff lint
        run: uvx ruff@0.15.20 check . --output-format=github

  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PySpark needs a JVM; the runner's default Java can drift, so pin it.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # Python version comes from .python-version; --locked fails the build
      # if uv.lock is out of sync with pyproject.toml instead of re-resolving.
      - name: Install dependencies
        run: uv sync --locked --extra dev

      # Slow end-to-end tests skip themselves automatically: they need the
      # user-provided reference_docs/ PDFs, which are gitignored and absent here.
      - name: Run tests
        run: >
          uv run pytest -v
          --junitxml=junit.xml
          --cov --cov-report=xml --cov-report=term-missing:skip-covered

      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            junit.xml
            coverage.xml
          if-no-files-found: error
